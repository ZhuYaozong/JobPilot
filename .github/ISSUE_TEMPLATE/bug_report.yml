name: Bug report
description: Report a reproducible problem in JobPilot.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest sequence that reproduces the issue.
      placeholder: |
        1. Start backend...
        2. Open...
        3. Click...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit or version

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123456"
          POSTGRES_DB: jobpilot
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jobpilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:123456@127.0.0.1:25432/jobpilot
      REDIS_URL: redis://127.0.0.1:26379/0
      AUTH_SECRET_KEY: ci-test-secret-not-for-production
      AUTH_DEV_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv --directory backend sync

      - name: Run migrations
        run: uv --directory backend run alembic upgrade head

      - name: Run backend tests
        run: uv --directory backend run pytest --basetemp pytest-cache-files-ci

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

<svg xmlns="http://www.w3.org/2000/svg" width="1716" height="916" viewBox="0 0 1716 916" role="img" aria-labelledby="title desc">
  <title id="title">JobPilot Core Flow 核心流</title>
  <desc id="desc">JobPilot 从 Vue WebUI、FastAPI、AssistantService、LangGraph ReAct 工作流，经 LLM、Tool Adapter 与注册工具，到 SSE 响应和 PostgreSQL / pgvector 持久化的核心链路。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#031831"/>
      <stop offset="0.55" stop-color="#020f24"/>
      <stop offset="1" stop-color="#010a18"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2039" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#061529" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="focus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08264f" stop-opacity="0.99"/>
      <stop offset="1" stop-color="#04162f" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#000814" flood-opacity="0.75"/>
    </filter>
    <filter id="focusGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#1f9dff" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f4f7ff"/>
    </marker>
    <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="1.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M10,0 L0,5 L10,10 Z" fill="#f4f7ff"/>
    </marker>
    <style>
      .panel { fill:url(#panel); stroke:#d7d9de; stroke-width:1.55; }
      .focus { fill:url(#focus); stroke:#35aef5; stroke-width:1.8; }
      .title { fill:#f6f7fb; font:700 42px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; }
      .head { fill:#f5f6fa; font:700 24px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; text-anchor:middle; }
      .body { fill:#f5f6fa; font:21px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; text-anchor:middle; }
      .small { fill:#f5f6fa; font:19px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; text-anchor:middle; }
      .accent { fill:#3ab8ff; font:19px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; text-anchor:middle; }
      .label { fill:#f5f6fa; font:18px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; }
      .legendText { fill:#f5f6fa; font:21px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; text-anchor:start; }
      .streamHead { fill:#f5f6fa; font:700 22px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; text-anchor:middle; }
      .tiny { fill:#f5f6fa; font:18px Arial,"Microsoft YaHei","Noto Sans CJK SC",sans-serif; text-anchor:middle; }
      .line { fill:none; stroke:#f4f7ff; stroke-width:2.25; marker-end:url(#arrow); }
      .twoway { fill:none; stroke:#f4f7ff; stroke-width:2.25; marker-start:url(#arrowStart); marker-end:url(#arrow); }
      .dash { fill:none; stroke:#f4f7ff; stroke-width:2.1; stroke-dasharray:8 8; marker-end:url(#arrow); }
      .rule { stroke:#28415d; stroke-width:1; }
    </style>
  </defs>

  <rect width="1716" height="916" fill="url(#bg)"/>
  <text x="28" y="60" class="title">JobPilot Core Flow 核心流</text>
  <line x1="23" y1="85" x2="158" y2="85" stroke="#35b5ff" stroke-width="2.1"/>
  <line x1="158" y1="85" x2="1642" y2="85" class="rule"/>

  <!-- Main request path -->
  <rect x="28" y="156" rx="10" ry="10" width="225" height="147" class="panel"/>
  <text x="140.5" y="221" class="head">Channel</text>
  <text x="140.5" y="257" class="body">Vue WebUI / Browser</text>

  <rect x="312" y="156" rx="10" ry="10" width="229" height="147" class="panel"/>
  <text x="426.5" y="221" class="head">FastAPI API</text>
  <text x="426.5" y="257" class="body">REST / SSE endpoints</text>

  <rect x="598" y="156" rx="10" ry="10" width="234" height="147" class="panel"/>
  <text x="715" y="207" class="head">AssistantService</text>
  <text x="715" y="241" class="small">payload, current_user,</text>
  <text x="715" y="273" class="small">emit_event</text>

  <rect x="879" y="125" rx="11" ry="11" width="335" height="264" class="focus"/>
  <text x="1046.5" y="168" class="head">LangGraph Workflow /</text>
  <text x="1046.5" y="201" class="head">ReAct Loop</text>
  <text x="1046.5" y="235" class="accent">(decision parsing &amp; validation)</text>
  <text x="1046.5" y="278" class="body">decide → call_tool → decide</text>
  <text x="1046.5" y="320" class="body">format_response →</text>
  <text x="1046.5" y="357" class="body">maybe_summarize</text>

  <rect x="1343" y="128" rx="10" ry="10" width="271" height="127" class="panel"/>
  <text x="1478.5" y="168" class="head">LLM Backend</text>
  <text x="1478.5" y="201" class="small">LLMClient /</text>
  <text x="1478.5" y="233" class="small">text generation</text>

  <rect x="1343" y="279" rx="10" ry="10" width="271" height="210" class="panel"/>
  <text x="1478.5" y="320" class="head">Tool Adapter</text>
  <text x="1478.5" y="355" class="small">BaseTool.invoke</text>
  <text x="1478.5" y="389" class="small">Pydantic validation</text>
  <text x="1478.5" y="423" class="small">ToolContext / user scope</text>
  <text x="1478.5" y="457" class="small">ToolCallLog / error mapping</text>

  <rect x="1331" y="542" rx="10" ry="10" width="306" height="227" class="panel"/>
  <text x="1484" y="584" class="head">Registered Tools</text>
  <text x="1484" y="619" class="small">parse_resume, parse_job_posting,</text>
  <text x="1484" y="651" class="small">analyze_match,</text>
  <text x="1484" y="683" class="small">generate_cover_letter,</text>
  <text x="1484" y="715" class="small">search_knowledge, ...</text>
  <text x="1484" y="747" class="small">(wrap business services)</text>

  <!-- Event stream and persistence -->
  <rect x="28" y="590" rx="10" ry="10" width="244" height="96" class="panel"/>
  <text x="150" y="628" class="tiny">FastAPI StreamingResponse</text>
  <text x="150" y="662" class="small">SSE (text/event-stream)</text>

  <rect x="290" y="510" rx="10" ry="10" width="276" height="135" class="panel"/>
  <text x="428" y="551" class="streamHead">Event Stream / Response</text>
  <text x="428" y="585" class="small">workflow emit_event</text>
  <text x="428" y="618" class="small">ToolCallTrace, final DTO</text>

  <rect x="654" y="631" rx="10" ry="10" width="408" height="219" class="panel"/>
  <ellipse cx="714" cy="680" rx="35" ry="12" fill="none" stroke="#f1f3f8" stroke-width="1.5"/>
  <path d="M679 680v62c0 7 16 12 35 12s35-5 35-12v-62" fill="none" stroke="#f1f3f8" stroke-width="1.5"/>
  <path d="M679 700c0 7 16 12 35 12s35-5 35-12M679 721c0 7 16 12 35 12s35-5 35-12" fill="none" stroke="#f1f3f8" stroke-width="1.35"/>
  <text x="877" y="681" class="head">PostgreSQL / pgvector</text>
  <text x="877" y="716" class="small">conversations, messages,</text>
  <text x="877" y="749" class="small">AgentRun, MemorySummary,</text>
  <text x="877" y="782" class="small">resumes, jobs, knowledge,</text>
  <text x="877" y="815" class="small">vectors, ToolCallLog</text>

  <!-- Main arrows -->
  <path d="M253 229 H307" class="line"/>
  <path d="M541 229 H593" class="line"/>
  <path d="M832 229 H874" class="line"/>
  <path d="M1222 184 H1335" class="twoway"/>
  <path d="M1222 329 H1335" class="twoway"/>
  <path d="M1478 497 V533" class="twoway"/>

  <!-- Service to event stream -->
  <path d="M715 303 V548 Q715 572 691 572 H571" class="line"/>
  <path d="M290 568 H133 V309" class="line"/>
  <path d="M133 590 V568" fill="none" stroke="#f4f7ff" stroke-width="2.25"/>

  <!-- Database reads / writes -->
  <path d="M715 303 V498 H800 V623" class="dash"/>
  <text x="815" y="565" class="label">reads / writes</text>
  <path d="M1343 402 H1267 V706 H1068" class="dash"/>
  <text x="1128" y="565" class="label">reads / writes</text>

  <!-- Legend -->
  <rect x="28" y="723" rx="10" ry="10" width="404" height="135" fill="none" stroke="#f4f7ff" stroke-width="1.5" stroke-dasharray="8 7"/>
  <path d="M48 753 H123" class="line"/>
  <text x="143" y="761" class="legendText">Main Request / Response Flow</text>
  <path d="M48 789 H123" class="dash"/>
  <text x="143" y="797" class="legendText">Reads / Writes to Database</text>
  <path d="M48 825 H123" class="twoway"/>
  <text x="143" y="833" class="legendText">Two-way Interaction</text>
</svg>
